<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Poll Form</title>
  <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
  <header>
    <h1>User Poll Form</h1>
  </header>
  <main>
    <form action="#" method="post">
      <fieldset>
        <legend>User Poll</legend>

        <div class="form-item column2">
          <label for="fullname">Full Name:</label>
          <input type="text" id="fullname" name="fullname">
        </div>

        <div class="form-item column2">
          <label for="useremail">Email:</label>
          <input type="email" id="useremail" name="useremail">
        </div>

        <div class="form-item column1">
          <label for="browser">Favorite Browser:</label>
          <select id="browser" name="browser">
            <option value="chrome">Chrome</option>
            <option value="firefox">Firefox</option>
            <option value="safari">Safari</option>
            <option value="edge">Edge</option>
          </select>
        </div>

        <div class="form-item column1">
          <label for="pet">Do you own a pet?</label>
          <input type="checkbox" id="pet" name="pet" value="yes">
        </div>

        <div class="form-item">
          <label for="places">Places Lived:</label>
          <textarea id="places" name="places" rows="4"></textarea>
        </div>

        <button type="submit">Submit Poll</button>
      </fieldset>
    </form>
  </main>
  <footer>
    <p>&copy; 2026 | HTML Forms - User Poll Activity | Enrique Ibarra</p>
  </footer>
</body>

</html>
