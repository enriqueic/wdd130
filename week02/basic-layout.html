<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta description="A basic HTML structure example using semantic HTML elements">
    <meta author="Enrique Ibarra">
    <title>Basic HTML structure</title>
</head>

<body>
    <header>
        <img src="images/basic-logo.png" alt="Basic logo" width="128" height="128">
    </header>

    <nav>
        <ul>
            <a href="google.com">Google</a>
            <a href="byupathway.edu">BYU-PW</a>
        </ul>
    </nav>

    <main>
        <h1>Basic HTML structure</h1>
        <section>
            <h2>Heading (main sections that aren't the title of the webpage)</h2>
            <p>Practicing semantic elements</p>
        </section>

        <section>
            <h2>Another main area of the content</h2>
            <p>Lorem ipsun</p>
        </section>

        <aside>
            <img
              src="https://content.churchofjesuschrist.org/templesldsorg/bc/Temples/photo-galleries/nauvoo-illinois/200x320/nauvoo-temple-lds-82901-wallpaper.jpg"
              alt="The exterior of the Nauvoo Illinois Temple and surrounding landscape of lawn and trees."
              width="200">
        </aside>
    </main>

    <footer>
        Enrique Ibarra
    </footer>
</body>

</html>
